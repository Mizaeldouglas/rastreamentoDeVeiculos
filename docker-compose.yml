services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: rastreador-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rastreador
    ports:
      - "5433:5432"
    volumes:
      - rastreador-db-data:/var/lib/postgresql/data

volumes:
  rastreador-db-data:
